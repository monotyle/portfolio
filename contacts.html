<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контакты — monotyle</title>
  <meta name="description" content="Контакты monotyle — напишите мне в Telegram." />
  <link rel="canonical" href="https://monotyle.dev/contacts.html" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Satoshi:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#080e1d;--card:#0e1729;--border:rgba(94,234,212,0.1);--text:#e8edf5;--muted:#5a6f93;--mint:#5eead4;--amber:#fbbf24;--blue:#60a5fa;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Satoshi',sans-serif;line-height:1.6;overflow-x:hidden;}
    .bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 90% 70% at 15% 5%,rgba(94,234,212,0.08) 0%,transparent 55%),radial-gradient(ellipse 70% 60% at 85% 85%,rgba(96,165,250,0.07) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 55% 45%,rgba(251,191,36,0.04) 0%,transparent 50%);}
    .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(94,234,212,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(94,234,212,0.025) 1px,transparent 1px);background-size:72px 72px;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,14,29,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-inner{max-width:1140px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;text-decoration:none;color:var(--text);}
    .logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,rgba(94,234,212,0.15),rgba(96,165,250,0.15));border:1px solid rgba(94,234,212,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-text{color:var(--muted);}
    .logo-name{color:var(--mint);}
    .nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
    .nav-links a{font-size:14px;font-weight:500;color:var(--muted);text-decoration:none;padding:8px 16px;border-radius:10px;transition:all 0.2s;}
    .nav-links a:hover{color:var(--text);background:rgba(94,234,212,0.07);}
    .nav-links a.active{color:var(--mint);background:rgba(94,234,212,0.08);}
    .nav-burger{display:none;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;}
    .mobile-nav{display:none;flex-direction:column;gap:4px;padding:16px 24px 20px;background:rgba(8,14,29,0.97);border-bottom:1px solid var(--border);}
    .mobile-nav.open{display:flex;}
    .mobile-nav a{font-size:15px;font-weight:500;color:var(--muted);text-decoration:none;padding:12px 16px;border-radius:10px;transition:all 0.2s;}
    .mobile-nav a:hover{color:var(--text);background:rgba(94,234,212,0.07);}
    main{position:relative;z-index:1;}
    .container{max-width:800px;margin:0 auto;padding:0 32px;}
    .reveal{opacity:0;transform:translateY(36px);transition:opacity 0.75s ease,transform 0.75s ease;}
    .reveal.visible{opacity:1;transform:none;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}

    .hero{padding:160px 0 80px;text-align:center;}
    .hero h1{font-family:'Cabinet Grotesk',sans-serif;font-weight:900;font-size:clamp(52px,8vw,100px);line-height:0.93;letter-spacing:-0.04em;animation:fadeUp 0.7s 0.1s ease both;}
    .hero h1 .grad{background:linear-gradient(135deg,var(--mint),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero-sub{margin:24px auto 0;font-size:18px;color:var(--muted);max-width:440px;animation:fadeUp 0.7s 0.2s ease both;}

    .cta-wrap{display:flex;justify-content:center;margin-top:56px;animation:fadeUp 0.7s 0.3s ease both;}
    .tg-main{display:flex;flex-direction:column;align-items:center;gap:20px;padding:64px 48px;background:var(--card);border:1px solid var(--border);border-radius:24px;width:100%;max-width:440px;text-decoration:none;transition:all 0.35s;position:relative;overflow:hidden;}
    .tg-main::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--mint),var(--blue),transparent);opacity:0;transition:opacity 0.35s;}
    .tg-main:hover{transform:translateY(-6px);box-shadow:0 32px 80px rgba(94,234,212,0.12);border-color:rgba(94,234,212,0.25);}
    .tg-main:hover::before{opacity:1;}
    .tg-icon{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--mint),var(--blue));}
    .tg-handle{font-family:'Cabinet Grotesk',sans-serif;font-size:28px;font-weight:900;letter-spacing:-0.02em;color:var(--text);}
    .tg-hint{font-size:14px;color:var(--muted);}

    footer{border-top:1px solid var(--border);padding:36px;text-align:center;position:relative;z-index:1;}
    footer p{font-size:13px;color:var(--muted);}
    @media(max-width:640px){.nav-links{display:none;}.nav-burger{display:block;}.container{padding:0 20px;}.hero{padding:120px 0 60px;}.tg-main{padding:48px 28px;}.tg-handle{font-size:22px;}}
  </style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6" stroke="url(#g1)"/>
          <polyline points="8 6 2 12 8 18" stroke="url(#g2)"/>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse"><stop stop-color="#5eead4"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
            <linearGradient id="g2" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse"><stop stop-color="#5eead4"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
          </defs>
        </svg>
      </div>
      <span><span class="logo-text">~/</span><span class="logo-name">monotyle</span></span>
    </a>
    <button class="nav-burger" id="burger"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <ul class="nav-links">
      <li><a href="index.html" data-nav="index.html">Главная</a></li>
      <li><a href="portfolio.html" data-nav="portfolio.html">Портфолио</a></li>
      <li><a href="about.html" data-nav="about.html">Обо мне</a></li>
      <li><a href="contacts.html" data-nav="contacts.html">Контакты</a></li>
    </ul>
  </div>
  <div class="mobile-nav" id="mobile-nav">
    <a href="index.html">Главная</a><a href="portfolio.html">Портфолио</a><a href="about.html">Обо мне</a><a href="contacts.html">Контакты</a>
  </div>
</nav>

<main>
  <section class="hero">
    <div class="container">
      <h1>Давайте<br><span class="grad">пообщаемся</span></h1>
      <p class="hero-sub">Открыт к интересным проектам, предложениям и вопросам</p>
      <div class="cta-wrap">
        <a href="https://t.me/monotyle" target="_blank" class="tg-main">
          <div class="tg-icon">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
              <path d="M21.5 4.5L2.5 11.5L9.5 13.5L17.5 8L12.5 15.5L19.5 19.5L21.5 4.5Z" fill="white"/>
              <path d="M9.5 13.5L12.5 19.5L14.5 15.5" fill="rgba(255,255,255,0.6)"/>
            </svg>
          </div>
          <span class="tg-handle">@monotyle</span>
          <span class="tg-hint">Написать в Telegram →</span>
        </a>
      </div>
    </div>
  </section>
</main>

<footer><p>© 2026 monotyle · Backend Developer · Python & FastAPI</p></footer>

<script>
  document.getElementById('burger').addEventListener('click',()=>document.getElementById('mobile-nav').classList.toggle('open'));
  const page=location.pathname.split('/').pop()||'index.html';
  document.querySelectorAll('[data-nav]').forEach(a=>{if(a.dataset.nav===page)a.classList.add('active');});
</script>
</body>
</html>
